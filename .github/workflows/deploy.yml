name: Deploy to WeChat CloudBase Run

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Tencent Cloud CLI
        run: pip install tccli

      - name: Configure Tencent Cloud CLI
        run: |
          tccli configure set secretId ${{ secrets.TENCENT_SECRET_ID }} secretKey ${{ secrets.TENCENT_SECRET_KEY }} region ap-shanghai

      - name: Verify credentials
        run: tccli sts GetCallerIdentity

      - name: Deploy to CloudBase Run
        run: |
          tccli tcb CreateCloudBaseRunServerVersion \
            --EnvId prod-d6gl3tboe2697ec1e \
            --ServerName express-df5d \
            --ContainerPort 80 \
            --Cpu 0.25 \
            --Mem 0.5 \
            --MinNum 1 \
            --MaxNum 10 \
            --PolicyType cpu \
            --PolicyThreshold 60 \
            --CustomLogs stdout \
            --Remark "auto-deploy-$(date +%Y%m%d-%H%M%S)"
