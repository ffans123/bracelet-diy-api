name: Deploy to WeChat CloudBase Run

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install CloudBase CLI
        run: npm install -g @cloudbase/cli

      - name: Login and Deploy
        run: |
          tcb login --apiKeyId "$API_KEY_ID" --apiKey "$API_KEY"
          tcb cloudrun:deploy --envId prod-d6gl3tboe2697ec1e --serviceName express-df5d
        env:
          API_KEY_ID: ${{ secrets.TCB_API_KEY_ID }}
          API_KEY: ${{ secrets.TCB_API_KEY }}
