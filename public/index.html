<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>后台管理系统 - 手串DIY</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 图片上传已改为走服务端代理，无需前端 SDK -->
    <style>
        :root {
            --text-main: #2C312E;
            --text-muted: #8A918C;
            --bg-base: #F4F2EC;
            --primary-green: #4CAF50;
            --primary-red: #EABF56;
            --primary-blue: #2196F3;
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg-base);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, "Noto Serif SC", serif;
        }

        .admin-container {
            min-height: 100vh;
            display: flex;
        }

        .sidebar {
            width: 220px;
            background: white;
            box-shadow: 2px 0 20px rgba(44,49,46,0.08);
            position: fixed;
            height: 100vh;
            z-index: 100;
        }

        .main-content {
            flex: 1;
            margin-left: 220px;
            padding: 30px;
        }

        .nav-item {
            padding: 16px 24px;
            border-left: 3px solid transparent;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.05em;
        }

        .nav-item.active {
            background: #fdfcfb;
            border-left-color: var(--primary-green);
            color: var(--text-main);
        }

        .nav-item:hover {
            background: #f8f6f2;
        }

        .card {
            background: white;
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(44,49,46,0.08);
            margin-bottom: 24px;
            border: 1px solid #fdfcfb;
        }

        .table {
            width: 100%;
            border-collapse: collapse;
        }

        .table th, .table td {
            padding: 16px 12px;
            text-align: left;
            border-bottom: 1px solid #f8f6f2;
        }

        .table th {
            background: #fdfcfb;
            font-weight: 600;
            font-size: 13px;
            color: var(--text-main);
            letter-spacing: 0.05em;
        }

        .table tr:hover {
            background: #f8f6f2;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.3s;
            letter-spacing: 0.05em;
        }

        .btn-primary {
            background: var(--primary-green);
            color: white;
        }

        .btn-primary:hover {
            background: #45a049;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(76,175,80,0.3);
        }

        .btn-danger {
            background: var(--primary-red);
            color: var(--text-main);
        }

        .btn-danger:hover {
            background: #d9ac45;
        }

        .btn-secondary {
            background: #e8e4df;
            color: var(--text-main);
        }

        .btn-secondary:hover {
            background: #ddd8d1;
        }

        .btn-success {
            background: #4CAF50;
            color: white;
        }

        .btn-success:hover {
            background: #45a049;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(44,49,46,0.5);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            border-radius: 24px;
            padding: 32px;
            width: 600px;
            max-width: 90vw;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(44,49,46,0.15);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 13px;
            color: var(--text-main);
            letter-spacing: 0.05em;
        }

        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e8e4df;
            border-radius: 12px;
            font-size: 14px;
            background: #fdfcfb;
            transition: all 0.3s;
        }

        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none;
            border-color: var(--primary-green);
            background: white;
        }

        .status-badge {
            padding: 6px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-pending { background: #fff3cd; color: #856404; }
        .status-paid { background: #d4edda; color: #155724; }
        .status-shipped { background: #d1ecf1; color: #0c5460; }
        .status-completed { background: #d4edda; color: #155724; }
        .status-cancelled { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // API配置 - 根据环境自动切换
        const API_BASE = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
            ? 'http://localhost:8080'  // 本地开发环境
            : ''; // 生产环境使用相对路径（同域名部署）

        // Token管理
        const getToken = () => {
            return localStorage.getItem('admin_token');
        };

        const setToken = (token) => {
            if (token) {
                console.log('保存token到localStorage, 长度:', token.length);
                localStorage.setItem('admin_token', token);
                console.log('Token已保存:', token.substring(0, 50) + '...');
            } else {
                console.log('清除token');
                localStorage.removeItem('admin_token');
            }
        };

        // API工具函数
        const api = {
            get: async (url, params = {}) => {
                const queryString = Object.keys(params)
                    .map(key => `${encodeURIComponent(key)}=${encodeURIComponent(params[key])}`)
                    .join('&');
                const fullUrl = queryString ? `${API_BASE + url}?${queryString}` : API_BASE + url;
                console.log('API GET请求URL:', fullUrl);
                const token = getToken();
                const headers = {};
                if (token) {
                    headers['Authorization'] = `Bearer ${token}`;
                }

                try {
                    const response = await fetch(fullUrl, { headers });
                    console.log('API响应状态:', response.status);
                    const result = await response.json();
                    console.log('API响应数据:', result);
                    return result;
                } catch (error) {
                    console.error('API请求失败:', error);
                    throw error;
                }
            },

            post: async (url, data) => {
                console.log('API POST请求URL:', API_BASE + url);
                console.log('请求数据:', data);
                const token = getToken();
                console.log('Token状态:', token ? '存在' : '不存在');
                console.log('Token内容:', token ? token.substring(0, 50) + '...' : '无');
                const headers = { 'Content-Type': 'application/json' };
                if (token) {
                    headers['Authorization'] = `Bearer ${token}`;
                    console.log('已设置Authorization头');
                } else {
                    console.warn('未设置Authorization头 - token为空');
                }

                try {
                    const response = await fetch(API_BASE + url, {
                        method: 'POST',
                        headers: headers,
                        body: JSON.stringify(data)
                    });
                    console.log('API响应状态:', response.status);
                    const result = await response.json();
                    console.log('API响应数据:', result);
                    return result;
                } catch (error) {
                    console.error('API请求失败:', error);
                    throw error;
                }
            }
        };

        // 珠子类型配置（从index.html同步）
        const BEAD_TYPES = [
            { id: 'w_2', name: '初雪奶霜' },
            { id: 'w_3', name: '象牙暖白' },
            { id: 'g_1', name: '早春浅青柠' },
            { id: 'g_2', name: '雨后翠青柠' },
            { id: 'g_3', name: '薄荷深青柠' },
            { id: 'g_4', name: '暖阳黄绿柠' },
            { id: 'g_5', name: '复古橄榄绿' },
            { id: 'g_6', name: '远山深墨绿' },
            { id: 'y_1', name: '芝士曲奇黄' },
            { id: 'y_2', name: '云间落日橘' },
            { id: 'y_3', name: '鸡油小圆蜜蜡' },
            { id: 'b_1', name: '半糖浅奶茶' },
            { id: 'b_2', name: '海盐焦糖棕' },
            { id: 'b_3', name: '糖炒栗子褐' },
            { id: 'b_4', name: '醇苦黑巧棕' },
            { id: 'ml_1', name: '天然老矿蜜蜡' },
            { id: 'ls_1', name: '原矿高瓷蓝绿松' },
            { id: 'cx_1', name: '国香奇楠' },
        ];

        // 订单详情弹窗组件
        function OrderDetailModal({ order, onClose, onUpdateStatus, onDelete }) {
            if (!order) return null;

            const [showShipForm, setShowShipForm] = useState(false);
            const [shipData, setShipData] = useState({
                express_company: '',
                express_no: ''
            });

            const getBeadName = (beadId) => {
                const bead = BEAD_TYPES.find(b => b.id === beadId);
                return bead ? bead.name : beadId;
            };

            const handleShipSubmit = async (e) => {
                e.preventDefault();
                if (!shipData.express_company || !shipData.express_no) {
                    alert('请填写完整的快递信息');
                    return;
                }

                try {
                    const result = await api.post('/backend/api/order/ship.php', {
                        order_id: order.id,
                        express_company: shipData.express_company,
                        express_no: shipData.express_no
                    });

                    if (result.code === 200) {
                        alert('发货成功');
                        setShowShipForm(false);
                        setShipData({ express_company: '', express_no: '' });
                        // 刷新订单列表
                        window.location.reload();
                    } else {
                        alert('发货失败: ' + result.message);
                    }
                } catch (error) {
                    alert('发货失败: ' + error.message);
                }
            };

            // 计算珠子统计
            // 计算珠子统计 - 直接使用 bead_details 中的数据
            const beadCounts = {};
            if (order.bead_details && Array.isArray(order.bead_details)) {
                order.bead_details.forEach(bead => {
                    // 优先使用 bead_details 中的 name，如果没有则使用备用名称
                    const name = bead.name || `珠子${bead.id}`;
                    beadCounts[name] = (beadCounts[name] || 0) + 1;
                });
            }

            // 选中的珠子信息
            const [selectedBead, setSelectedBead] = useState(null);

            // 渲染串珠可视化（使用与前端工坊相同的逻辑）
            const renderBeadVisualization = () => {
                if (!order.bead_details || !Array.isArray(order.bead_details) || order.bead_details.length === 0) {
                    return <div className="text-center text-gray-500 py-8">无设计数据</div>;
                }

                const containerSize = 200;
                const beadSize = 11; // 基准珠子尺寸
                const px_per_mm = 1; // 像素比例
                const gapRatio = 0.97; // 间隙比例

                // 提取珠子数据
                const beads = order.bead_details.map(bead => ({
                    mm: parseInt(bead.size) || 11, // 珠子尺寸
                    gapRatio: gapRatio,
                    image: bead.image,
                    color: bead.color,
                    name: bead.name,
                    bead_id: bead.bead_id,
                    id: bead.id,
                    category: bead.category,
                    color_family: bead.color_family
                }));

                const N = beads.length;

                // 计算总的物理尺寸
                const total_effective_mm = beads.reduce((sum, b) => sum + (b.mm * b.gapRatio), 0);

                // 计算圆半径
                const computedR = N >= 3
                    ? (total_effective_mm / (2 * N * Math.sin(Math.PI / N))) * px_per_mm
                    : (beads[0]?.mm * px_per_mm);

                const maxBeadMm = Math.max(...beads.map(b => b.mm));
                const physicalSize = computedR * 2 + (maxBeadMm * px_per_mm);
                const paddedSize = physicalSize * 1.05;
                const scale = containerSize / paddedSize;

                let currTheta = 0;

                return (
                    <div style={{ width: containerSize, height: containerSize, position: 'relative', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                        <div style={{
                            width: physicalSize,
                            height: physicalSize,
                            transform: `scale(${scale})`,
                            position: 'relative'
                        }}>
                            {beads.map((bead, i) => {
                                const span = ((bead.mm * bead.gapRatio) / total_effective_mm) * Math.PI * 2;
                                const ang = currTheta + span / 2;
                                currTheta += span;
                                const rot = ang + Math.PI / 2;
                                const displaySize = bead.mm * px_per_mm;

                                // 计算珠子位置
                                const x = (physicalSize / 2) + Math.cos(ang) * computedR - displaySize / 2;
                                const y = (physicalSize / 2) + Math.sin(ang) * computedR - displaySize / 2;

                                // 图片路径
                                const imageSrc = bead.image && bead.image.startsWith('http')
                                    ? bead.image
                                    : (bead.image ? API_BASE + '/' + bead.image : null);

                                const bgStyle = imageSrc
                                    ? {
                                        backgroundImage: `url(${imageSrc})`,
                                        backgroundSize: 'cover',
                                        backgroundPosition: 'center',
                                        backgroundRepeat: 'no-repeat'
                                    }
                                    : {
                                        backgroundColor: bead.color || '#9E9E9E'
                                    };

                                const isSelected = selectedBead && selectedBead.index === i;

                                return (
                                    <div
                                        key={i}
                                        style={{
                                            position: 'absolute',
                                            left: x,
                                            top: y,
                                            width: displaySize,
                                            height: displaySize,
                                            borderRadius: '50%',
                                            border: isSelected ? '3px solid #EF4444' : '1px solid rgba(0,0,0,0.2)',
                                            boxShadow: isSelected ? '0 0 10px 3px rgba(239, 68, 68, 0.5)' : '2px 2px 4px rgba(0,0,0,0.3)',
                                            cursor: 'pointer',
                                            transition: 'transform 0.2s, border 0.2s, box-shadow 0.2s',
                                            transform: `rotate(${rot}rad)`,
                                            ...bgStyle
                                        }}
                                        title={`点击查看: ${bead.name}`}
                                        onClick={() => {
                                            if (isSelected) {
                                                setSelectedBead(null);
                                            } else {
                                                setSelectedBead({...bead, index: i, position: i + 1});
                                            }
                                        }}
                                        onMouseEnter={(e) => e.currentTarget.style.transform = `rotate(${rot}rad) scale(1.2)`}
                                        onMouseLeave={(e) => e.currentTarget.style.transform = `rotate(${rot}rad) scale(1)`}
                                    />
                                );
                            })}
                        </div>
                    </div>
                );
            };

            return (
                <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
                    <div className="bg-white rounded-lg shadow-xl max-w-4xl w-full max-h-[90vh] overflow-y-auto">
                        <div className="sticky top-0 bg-white border-b px-6 py-4 flex justify-between items-center">
                            <h3 className="text-xl font-bold">订单详情 - #{order.id}</h3>
                            <button onClick={onClose} className="text-gray-500 hover:text-gray-700 text-2xl">&times;</button>
                        </div>

                        <div className="p-6">
                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                                {/* 左侧：订单信息 */}
                                <div>
                                    <h4 className="font-bold mb-4 text-lg">基本信息</h4>
                                    <div className="space-y-2">
                                        <div><strong>订单号：</strong>{order.order_no}</div>
                                        {order.user && (
                                            <div><strong>用户：</strong>{order.user.nickname || order.user.username}</div>
                                        )}
                                        <div><strong>收货人：</strong>{order.consignee}</div>
                                        <div><strong>联系电话：</strong>{order.phone}</div>
                                        <div><strong>收货地址：</strong>{order.address}</div>
                                        <div><strong>总金额：</strong><span className="text-green-600 font-bold">¥{order.total_price}</span></div>
                                        <div><strong>快递公司：</strong>{order.express_company || '未填写'}</div>
                                        <div><strong>快递单号：</strong>{order.express_no || '未填写'}</div>
                                        <div><strong>发货时间：</strong>{order.ship_time || '-'}</div>
                                        <div><strong>支付时间：</strong>{order.pay_time || '未支付'}</div>
                                        <div><strong>支付宝订单号：</strong>{order.trade_no || '-'}</div>
                                        <div><strong>订单状态：</strong>
                                            <span className={`ml-2 px-3 py-1 rounded text-sm ${
                                                order.status === 'pending' ? 'bg-yellow-100 text-yellow-800' :
                                                order.status === 'paid' ? 'bg-blue-100 text-blue-800' :
                                                order.status === 'shipped' ? 'bg-green-100 text-green-800' :
                                                'bg-gray-100 text-gray-800'
                                            }`}>
                                                {order.status === 'pending' ? '待付款' :
                                                 order.status === 'paid' ? '已付款' :
                                                 order.status === 'shipped' ? '已发货' : '已完成'}
                                            </span>
                                        </div>
                                        <div><strong>创建时间：</strong>{new Date(order.created_at).toLocaleString()}</div>
                                    </div>

                                    <h4 className="font-bold mt-6 mb-4 text-lg">设计信息</h4>
                                    <div className="space-y-2">
                                        <div><strong>设计名称：</strong>{order.design_name || '定制手串'}</div>
                                        <div><strong>手串类型：</strong>{order.mode === 'bracelet' ? '手串' : '项链'}</div>
                                        <div><strong>珠子数量：</strong>{order.bead_details ? order.bead_details.length : 0}颗</div>
                                        <div><strong>制作方式：</strong>
                                            {order.production_method === 'assembled' ? '串好成品（+9.9元）' : '自己动手（免费）'}
                                        </div>
                                        <div><strong>包装方式：</strong>
                                            {order.packaging_method === 'gift' ? '礼盒包装（+10元）' : '普通包装（免费）'}
                                        </div>
                                        <div><strong>快递方式：</strong>
                                            {order.express_method === 'sf' ? '顺丰快递（+18元）' : '韵达快递（+9元）'}
                                        </div>
                                        {order.production_method === 'assembled' && order.rope_color && (
                                            <div className="flex items-center gap-2">
                                                <strong>绳子颜色：</strong>
                                                <div className="flex items-center gap-2">
                                                    <img
                                                        src={`/uploads/images/${order.rope_color}_${order.rope_color === '001' ? '红色' :
                                                         order.rope_color === '002' ? '黑色' :
                                                         order.rope_color === '003' ? '淡蓝色' :
                                                         order.rope_color === '004' ? '白色' :
                                                         order.rope_color === '005' ? '紫色' :
                                                         order.rope_color === '006' ? '橙色' :
                                                         order.rope_color === '007' ? '粉色' :
                                                         order.rope_color === '008' ? '绿色' : order.rope_color}.png`}
                                                        alt={order.rope_color}
                                                        className="w-10 h-10 rounded-lg border-2 border-gray-200 shadow-sm object-cover"
                                                        onError={(e) => {
                                                            console.error('绳子颜色图片加载失败:', e.target.src);
                                                            e.target.style.display = 'none';
                                                        }}
                                                    />
                                                    <span className="text-gray-700">
                                                        {order.rope_color === '001' ? '红色' :
                                                         order.rope_color === '002' ? '黑色' :
                                                         order.rope_color === '003' ? '淡蓝色' :
                                                         order.rope_color === '004' ? '白色' :
                                                         order.rope_color === '005' ? '紫色' :
                                                         order.rope_color === '006' ? '橙色' :
                                                         order.rope_color === '007' ? '粉色' :
                                                         order.rope_color === '008' ? '绿色' : order.rope_color}
                                                    </span>
                                                </div>
                                            </div>
                                        )}
                                    </div>

                                    <h4 className="font-bold mt-6 mb-4 text-lg">封面图（动态绘制）</h4>
                                    <div className="flex justify-center items-center bg-gray-50 rounded-lg p-8">
                                        {renderBeadVisualization()}
                                    </div>
                                </div>

                                {/* 右侧：珠子可视化 */}
                                <div>
                                    <h4 className="font-bold mb-4 text-lg">串珠预览（动态绘制）</h4>
                                    <div className="flex justify-center items-center bg-gray-50 rounded-lg p-8">
                                        {renderBeadVisualization()}
                                    </div>

                                    {/* 选中的珠子信息 */}
                                    {selectedBead && (
                                        <div className="mt-4 bg-gradient-to-r from-blue-50 to-purple-50 border-2 border-blue-200 rounded-lg p-4">
                                            <h4 className="font-bold text-lg mb-3 text-blue-700">🔍 珠子详情</h4>
                                            <div className="space-y-3">
                                                <div className="flex items-center gap-3">
                                                    <div className="w-16 h-16 rounded-lg border-2 border-gray-300 overflow-hidden bg-white shadow-sm">
                                                        {selectedBead.image && selectedBead.image.startsWith('http') ? (
                                                            <img
                                                                src={selectedBead.image}
                                                                alt={selectedBead.name}
                                                                className="w-full h-full object-cover"
                                                            />
                                                        ) : selectedBead.image ? (
                                                            <img
                                                                src={API_BASE + '/' + selectedBead.image}
                                                                alt={selectedBead.name}
                                                                className="w-full h-full object-cover"
                                                                onError={(e) => {
                                                                    e.target.style.display = 'none';
                                                                    e.target.parentElement.style.backgroundColor = selectedBead.color || '#9E9E9E';
                                                                }}
                                                            />
                                                        ) : (
                                                            <div style={{ backgroundColor: selectedBead.color || '#9E9E9E' }} className="w-full h-full"></div>
                                                        )}
                                                    </div>
                                                    <div className="flex-1">

                reason: '管理员充值'
            });
            const [formData, setFormData] = useState({
                nickname: '',
                role: 'user'
            });

            useEffect(() => {
                loadUsers();
            }, []);

            const loadUsers = async () => {
                try {
                    const params = { admin: 'true' };
                    if (keyword) {
                        params.keyword = keyword;
                    }
                    const result = await api.get('/backend/api/user/list.php', params);
                    console.log('用户API返回结果:', result);
                    if (result.code === 200) {
                        setUsers(result.data.list || []);
                        console.log('设置用户数据:', result.data.list);
                    } else {
                        console.error('API返回错误:', result.message);
                    }
                } catch (error) {
                    console.error('加载用户失败:', error);
                    alert('加载用户失败: ' + error.message);
                } finally {
                    setLoading(false);
                }

                e.preventDefault();
                loadUsers();

                setEditingUser(user);

                    role: user.role || 'user'

        // 订单管理组件
        function OrderManagement() {
            const [orders, setOrders] = useState([]);
            const [filteredOrders, setFilteredOrders] = useState([]);
            const [loading, setLoading] = useState(true);
            const [selectedOrder, setSelectedOrder] = useState(null);
            const [searchKeyword, setSearchKeyword] = useState('');
            const [statusFilter, setStatusFilter] = useState('all');

            useEffect(() => {
                loadOrders();
            }, []);

            // 监听搜索和状态筛选变化
            useEffect(() => {
                filterOrders();
            }, [orders, searchKeyword, statusFilter]);

            const loadOrders = async () => {
                console.log('开始加载订单列表...');
                try {
                    // 请求所有订单,不分页 (设置pageSize为一个很大的数字)
                    const result = await api.get('/backend/api/order/list.php', {
                        admin: 'true',
                        pageSize: 1000  // 请求所有订单
                    });
                    console.log('订单API返回结果:', result);
                    if (result.code === 200) {
                        const newOrders = result.data.list || [];
                        console.log(`加载到 ${newOrders.length} 个订单`);
                        console.log('订单数据示例:', newOrders[0]);
                        setOrders(newOrders);
                    } else {
                        console.error('API返回错误:', result.message);
                    }
                } catch (error) {
                    console.error('加载订单失败:', error);
                } finally {
                    setLoading(false);
                }
            };

            const filterOrders = () => {
                let filtered = [...orders];

                // 搜索筛选
                if (searchKeyword) {
                    const keyword = searchKeyword.toLowerCase();
                    filtered = filtered.filter(order =>
                        order.id.toString().includes(keyword) ||
                        (order.order_no && order.order_no.toLowerCase().includes(keyword)) ||
                        (order.user && order.user.username && order.user.username.toLowerCase().includes(keyword)) ||
                        (order.user && order.user.nickname && order.user.nickname.toLowerCase().includes(keyword))
                    );
                }

                // 状态筛选
                if (statusFilter !== 'all') {
                    filtered = filtered.filter(order => order.status === statusFilter);
                }

                setFilteredOrders(filtered);
            };

            const handleSearch = (e) => {
                e.preventDefault();
                filterOrders();
            };

            const updateOrderStatus = async (orderId, status) => {
                console.log(`[updateOrderStatus] 开始更新订单 #${orderId} 状态为 ${status}`);
                try {
                    const result = await api.post('/backend/api/order/update_status.php', {
                        order_id: orderId,
                        status: status
                    });

                    console.log('[updateOrderStatus] API响应:', result);

                    if (result.code === 200) {
                        alert('订单状态更新成功');

                        // 如果当前有状态筛选，且修改后的状态与筛选条件不符，则重置筛选为"全部"
                        if (statusFilter !== 'all' && status !== statusFilter) {
                            console.log(`[updateOrderStatus] 重置筛选从 "${statusFilter}" 到 "all"`);
                            setStatusFilter('all');
                        }

                        // 重新加载订单列表
                        console.log('[updateOrderStatus] 重新加载订单列表...');
                        await loadOrders();
                        console.log('[updateOrderStatus] 订单列表已更新');

                        // 调试:检查更新后的订单列表
                        console.log('[updateOrderStatus] 调试:订单列表中的订单#' + orderId + '状态:',
                            orders.find(o => o.id === orderId)?.status);

                        // 关闭订单详情弹窗
                        setSelectedOrder(null);
                    } else {
                        alert('更新失败: ' + result.message);
                    }
                } catch (error) {
                    console.error('[updateOrderStatus] 更新订单状态失败:', error);
                    alert('更新失败: ' + error.message);
                }
            };

            const deleteOrder = async (orderId) => {
                if (!confirm('确定要删除这个订单吗？')) return;

                try {
                    console.log('删除订单 - 订单ID:', orderId);

                loadBeads();

                if (missingFields.length > 0) {
                    alert('请填写以下必填字段: ' + missingFields.join(', '));
                    return;

                        ? await api.post('/backend/api/bead/update.php', { id: editingBead.id, ...formData })

                    if (result.code === 200) {
                        alert(editingBead ? '盘珠更新成功' : '盘珠添加成功');
                        setShowModal(false);
                        setEditingBead(null);
                        setFormData({ name: '', category: '', color_family: '', type: '', size: '', price: '', image: '', description: '' });

            const [error, setError] = useState('');

            console.log('LoginModal render, isOpen:', isOpen, 'username:', username, 'password:', password);

            if (!isOpen) return null;

            const handleSubmit = async (e) => {
                e.preventDefault();
                console.log('开始登录, username:', username);

                if (!username || !password) {
                    alert('请输入用户名和密码');
                    return;
                }

                setLoading(true);

                    });

                    console.log('登录响应:', result);

                    if (result.code === 200 && result.data.token) {
                        console.log('登录成功, token:', result.data.token);
                        onLogin(result.data.token);
                        onClose();
                        alert('登录成功');
                    } else {
                        const errorMsg = result.message || '用户名或密码错误';
                        console.error('登录失败:', errorMsg);
                        setError(errorMsg);
                        alert('登录失败: ' + errorMsg);
                    }
                } catch (error) {
                    console.error('登录异常:', error);
                    const errorMsg = error.message || '网络错误';
                    setError(errorMsg);
                    alert('登录失败: ' + errorMsg);
                }                     finally {
                        setLoading(false);
                }
            };

            return (
                <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
                    <div className="bg-white rounded-lg shadow-xl max-w-md w-full p-6">
                        <h3 className="text-xl font-bold mb-6 text-center">管理员登录</h3>
                        <form onSubmit={handleSubmit}>
                            <div className="form-group">
                                <label>用户名</label>
                                <input
                                    type="text"
                                    value={username}
                                    onChange={e => setUsername(e.target.value)}
                                    placeholder="请输入管理员用户名"
                                    disabled={loading}
                                    required
                                />
                            </div>
                            <div className="form-group">
                                <label>密码</label>
                                <input
                                    type="password"
                                    value={password}
                                    onChange={e => setPassword(e.target.value)}
                                    placeholder="请输入密码"
                                    disabled={loading}
                                    required
                                />
                            </div>
                            <button
                                type="submit"
                                className="btn btn-primary w-full mt-4"
                                disabled={loading}
                                style={{ position: 'relative', zIndex: 10 }}
                            >
                                {loading ? '登录中...' : '登录'}
                            </button>
                        </form>

                        <button
                            className="btn btn-secondary w-full mt-3"
                            onClick={onClose}
                            disabled={loading}
                            style={{ position: 'relative', zIndex: 10 }}
                        >
                            取消
                        </button>

                        {error && (
                            <div className="mt-4 p-3 bg-red-50 border border-red-200 rounded text-red-600 text-sm">
                                {error}
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // 主后台组件
        function AdminDashboard() {
            const [activeTab, setActiveTab] = useState('orders');
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [showLoginModal, setShowLoginModal] = useState(false);
            const [mounted, setMounted] = useState(false);

            // 检查是否已登录
            useEffect(() => {
                console.log('AdminDashboard mounted');
                setMounted(true);

                const token = getToken();
                console.log('Token from localStorage:', token ? '存在' : '不存在');

                if (token) {
                    // 验证token是否有效
                    api.get('/backend/api/user/verify_token.php').then(result => {
                        console.log('Token验证结果:', result);
                        if (result.code === 200) {
                            setIsLoggedIn(true);
                        } else {
                            // token无效，清除并显示登录
                            console.log('Token无效:', result.message);
                            setToken(null);
                            setShowLoginModal(true);
                        }
                    }).catch((error) => {
                        console.log('Token验证失败:', error);
                        setToken(null);
                        setShowLoginModal(true);
                    });
                } else {
                    setShowLoginModal(true);
                }
            }, []);

            const handleLogin = (token) => {
                console.log('handleLogin收到token:', token ? token.substring(0, 50) + '...' : '无');
                setToken(token);
                setIsLoggedIn(true);
                console.log('登录后检查token:', getToken() ? '存在' : '不存在');
            };

            // ========== 数据迁移面板 ==========
            function MigrationPanel() {
                const [status, setStatus] = useState(null);
                const [loading, setLoading] = useState(false);
                const [started, setStarted] = useState(false);

                const loadStatus = async () => {
                    try {
                        const result = await api.get('/migrate/status');
                        if (result.code === 200) {
                            setStatus(result.data);
                        }
                    } catch (e) {
                        console.error('获取迁移状态失败:', e);
                    }
                };

                useEffect(() => {
                    loadStatus();
                    const interval = setInterval(loadStatus, 5000);
                    return () => clearInterval(interval);
                }, []);

                const handleStart = async () => {
                    if (!confirm('确定开始迁移吗？\n\n这将把七牛云上的 909 张图片下载并上传到微信云托管对象存储。\n迁移过程中请勿关闭页面。')) {
                        return;
                    }
                    setLoading(true);
                    setStarted(true);
                    try {
                        const result = await api.get('/migrate/start');
                        if (result.code === 200) {
                            alert('迁移任务已启动！\n请查看「运行日志」了解进度，本页面每 5 秒自动刷新状态。');
                        } else {
                            alert('启动失败: ' + result.message);
                            setLoading(false);
                        }
                    } catch (e) {
                        alert('启动失败: ' + e.message);
                        setLoading(false);
                    }
                };

                return (
                    <div>
                        <div className="card mb-6">
                            <h2 className="text-xl font-bold mb-4">图片迁移工具</h2>
                            <p className="text-gray-600 mb-4">
                                将七牛云 CDN 上的珠子图片批量迁移到微信云托管对象存储（COS）。
                                迁移后小程序端图片加载更稳定，管理后台上传也更可靠。
                            </p>

                            {status && (
                                <div className="bg-gray-50 rounded-lg p-4 mb-4">
                                    <div className="grid grid-cols-2 md:grid-cols-4 gap-4 text-center">
                                        <div>
                                            <div className="text-2xl font-bold text-gray-800">{status.total}</div>
                                            <div className="text-xs text-gray-500">珠子总数</div>
                                        </div>
                                        <div>
                                            <div className="text-2xl font-bold text-blue-600">{status.withImage}</div>
                                            <div className="text-xs text-gray-500">有图片</div>
                                        </div>
                                        <div>
                                            <div className="text-2xl font-bold text-green-600">{status.cosUrls}</div>
                                            <div className="text-xs text-gray-500">已迁移(COS)</div>
                                        </div>
                                        <div>
                                            <div className="text-2xl font-bold text-orange-600">{status.qiniuUrls}</div>
                                            <div className="text-xs text-gray-500">待迁移(七牛云)</div>
                                        </div>
                                    </div>
                                    <div className="mt-4">
                                        <div className="flex justify-between text-sm mb-1">
                                            <span>迁移进度</span>
                                            <span className="font-bold">{status.percent}%</span>
                                        </div>
                                        <div className="w-full bg-gray-200 rounded-full h-2">
                                            <div
                                                className="bg-green-500 h-2 rounded-full transition-all duration-500"
                                                style={{ width: status.percent + '%' }}
                                            ></div>
                                        </div>
                                    </div>
                                </div>
                            )}

                            <div className="flex gap-3">
                                <button
                                    onClick={handleStart}
                                    disabled={loading || (status && status.percent >= 100)}
                                    className={`btn ${status && status.percent >= 100 ? 'btn-secondary' : 'btn-primary'}`}
                                >
                                    {status && status.percent >= 100
                                        ? '✅ 迁移已完成'
                                        : started
                                            ? (loading ? '⏳ 正在启动...' : '🚀 迁移进行中...')
                                            : '🚀 开始迁移'
                                    }
                                </button>
                                <button
                                    onClick={loadStatus}
                                    className="btn btn-secondary"
                                >
                                    🔄 刷新状态
                                </button>
                            </div>

                            {started && !loading && (
                                <div className="mt-4 p-3 bg-blue-50 rounded-lg text-sm text-blue-700">
                                    💡 迁移正在后台执行，每 5 秒自动刷新进度。<br/>
                                    你也可以前往云托管控制台 →「运行日志」查看实时输出。
                                </div>
                            )}
                        </div>

                        <div className="card">
                            <h3 className="font-bold mb-2">注意事项</h3>
                            <ul className="text-sm text-gray-600 space-y-1 list-disc list-inside">
                                <li>迁移前已自动备份 beads.json 到 beads.json.bak</li>
                                <li>七牛云原始图片不会被删除，可随时回滚</li>
                                <li>每张图片下载+上传约需 1-3 秒，全部 909 张预计 15-30 分钟</li>
                                <li>迁移过程中可以正常使用管理后台，但不要新增/编辑珠子</li>
                                <li>如果迁移中断，重新点击「开始迁移」会自动断点续传</li>
                            </ul>
                        </div>
                    </div>
                );
            }

            const handleLogout = () => {
                if (confirm('确定要退出登录吗？')) {
                    setToken(null);
                    setIsLoggedIn(false);
                    setShowLoginModal(true);
                }
            };

            const handleChangePassword = () => {
                const oldPassword = prompt('请输入当前密码：');
                if (!oldPassword) return;

                const newPassword = prompt('请输入新密码：');
                if (!newPassword) {
                    alert('新密码不能为空');
                    return;
                }

                const confirmPassword = prompt('请再次输入新密码：');
                if (newPassword !== confirmPassword) {
                    alert('两次输入的密码不一致');
                    return;
                }

                api.post('/backend/api/user/change_password.php', {
                    old_password: oldPassword,
                    new_password: newPassword
                }).then(result => {
                    if (result.code === 200) {
                        alert('密码修改成功！请重新登录');
                        handleLogout();
                    } else {
                        alert('密码修改失败：' + result.message);
                    }
                }).catch(error => {
                    alert('密码修改失败：' + error.message);
                });
            };
            
            const tabs = [
                { id: 'orders', name: '订单管理', icon: '📦' },
                { id: 'beads', name: '盘珠管理', icon: '🔮' },
                { id: 'users', name: '用户管理', icon: '👥' },
                { id: 'migrate', name: '数据迁移', icon: '🚀' }
            ];
            
            const renderContent = () => {
                switch (activeTab) {
                    case 'orders':
                        return <OrderManagement />;
                    case 'beads':
                        return <BeadManagement />;
                    case 'users':
                        return <UserManagement />;
                    case 'migrate':
                        return <MigrationPanel />;
                    default:
                        return <OrderManagement />;
                }
            };
            
            if (!isLoggedIn) {
                console.log('渲染未登录页面');
                return (
                    <div className="min-h-screen flex items-center justify-center bg-gray-100">
                        <div className="bg-white rounded-lg shadow-xl p-8 max-w-md w-full">
                            <h1 className="text-2xl font-bold text-center mb-6">后台管理系统</h1>
                            <p className="text-gray-600 text-center mb-6">手串DIY平台</p>
                            <button
                                onClick={() => {
                                    console.log('点击登录按钮');
                                    setShowLoginModal(true);
                                }}
                                className="btn btn-primary w-full"
                                style={{ position: 'relative', zIndex: 10 }}
                            >
                                点击登录
                            </button>
                        </div>
                        {/* 登录弹窗 */}
                        {mounted && (
                            <LoginModal
                                isOpen={showLoginModal}
                                onClose={() => setShowLoginModal(false)}
                                onLogin={handleLogin}
                            />
                        )}
                    </div>
                );
            }

            console.log('渲染已登录页面');
            return (
                <div className="admin-container">
                    {mounted && (
                        <LoginModal
                            isOpen={showLoginModal}
                            onClose={() => setShowLoginModal(false)}
                            onLogin={handleLogin}
                        />
                    )}

                    <div className="sidebar">
                        <div className="p-6 border-b">
                            <h1 className="text-xl font-bold text-gray-800">后台管理系统</h1>
                            <p className="text-sm text-gray-600 mt-1">手串DIY平台</p>
                        </div>

                        <nav className="mt-4">
                            {tabs.map(tab => (
                                <div
                                    key={tab.id}
                                    className={`nav-item ${activeTab === tab.id ? 'active' : ''}`}
                                    onClick={() => setActiveTab(tab.id)}
                                >
                                    <span className="mr-2">{tab.icon}</span>
                                    {tab.name}
                                </div>
                            ))}
                        </nav>

                        <div className="mt-8 px-6 border-t pt-6">
                            <button
                                onClick={handleChangePassword}
                                className="w-full py-2 text-left text-gray-600 hover:text-blue-600 transition-colors"
                            >
                                修改密码
                            </button>
                            <button
                                onClick={handleLogout}
                                className="w-full py-2 text-left text-gray-600 hover:text-red-600 transition-colors"
                            >
                                退出登录
                            </button>
                        </div>
                    </div>

                    <div className="main-content">
                        <div className="mb-6">
                            <h1 className="text-2xl font-bold text-gray-800">
                                {tabs.find(tab => tab.id === activeTab)?.name}
                            </h1>
                            <p className="text-gray-600">管理平台数据和内容</p>
                        </div>

                        {renderContent()}
                    </div>
                </div>
            );
        }

        // 渲染应用（React 18 新API）
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AdminDashboard />);
    </script>
</body>
</html>
